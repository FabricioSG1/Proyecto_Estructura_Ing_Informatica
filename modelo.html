<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<style>
body{
    margin:0;
    overflow:hidden;
}
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

</head>

<body>

<script>

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

const camera = new THREE.PerspectiveCamera(
    90,
    window.innerWidth / window.innerHeight,0.1,1000);

camera.position.set(0,80,220);

const renderer = new THREE.WebGLRenderer({
    antialias:true
});

renderer.setSize(window.innerWidth,window.innerHeight);
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
document.body.appendChild(renderer.domElement);

const controls=new THREE.OrbitControls(
    camera,
    renderer.domElement
);

controls.enableDamping=true;
controls.dampingFactor=0.05;
controls.minDistance=5;
controls.maxDistance=100;

const ambientLight=new THREE.AmbientLight(0x4a5d7f,1.5);
scene.add(ambientLight);

const directionalLight=new THREE.DirectionalLight(0xbfdcff,0.9);

directionalLight.position.set(0,0,0);
directionalLight.castShadow=true;
directionalLight.shadow.mapSize.width=2048;
directionalLight.shadow.mapSize.height=2048;

scene.add(directionalLight);

const fillLight=new THREE.DirectionalLight(0x3344aa,0);
fillLight.position.set(0,0,0);
scene.add(fillLight);

const pointLight=new THREE.PointLight(0xffffff,4,300);
pointLight.position.set(0,100,250);
pointLight.castShadow=true;

scene.add(pointLight);

const foco=new THREE.Mesh(
    new THREE.SphereGeometry(30,15,32),
    new THREE.MeshPhongMaterial({
        color:0xffffff,
        emissive:0xffffff,
        emissiveIntensity:100
    })
);
foco.position.copy(pointLight.position);
scene.add(foco);


const axesHelper=new THREE.AxesHelper(5);
scene.add(axesHelper);

const floorGeometry=new THREE.PlaneGeometry(50,50);

const floorMaterial=new THREE.MeshLambertMaterial({
    color:0x1b2d1});

const loader=new THREE.GLTFLoader();

loader.load(

    "Estructura Ing. Informatica.glb",

    function(gltf){

        const modelo=gltf.scene;
        modelo.position.set(220,-19,60);
        modelo.scale.set(1,1,1);
        modelo.traverse(function(child){
    if(child.isMesh){
        child.material=new THREE.MeshPhongMaterial({
            color:child.material.color,shininess:40,specular:0x777777
        });

        child.castShadow=true;
        child.receiveShadow=true;
    }
});
        scene.add(modelo);

    },

    function(xhr){

        console.log((xhr.loaded/xhr.total*100).toFixed(0)+"% cargado");

    },

    function(error){

        console.error(error);

    }

);

function animate(){

    requestAnimationFrame(animate);

    angulo += velocidad;

    camera.position.x =
        centroX + Math.cos(angulo) * radio;

    camera.position.z =
        centroZ + Math.sin(angulo) * radio;

    camera.lookAt(
        centroX,
        centroY,
        centroZ
    );

    renderer.render(
        scene,
        camera
    );

}

let angulo = 0;

const centroX = 0;
const centroY = 50;
const centroZ = 10;

const radio = 250;

const velocidad = 0.003;

animate();

window.addEventListener("resize",()=>{

    camera.aspect=window.innerWidth/window.innerHeight;

    camera.updateProjectionMatrix();

    renderer.setSize(window.innerWidth,window.innerHeight);

});

</script>

</body>
</html>
