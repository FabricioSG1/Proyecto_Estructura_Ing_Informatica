<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ingeniería Informática</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    background:linear-gradient(
        135deg,
        #0f172a,
        #1e293b,
        #0f172a
    );
}

.fondo{
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top right,#38bdf855,transparent 40%),
    radial-gradient(circle at bottom left,#0ea5e955,transparent 40%);
}

.contenedor{
    position:relative;
    z-index:10;

    width:100%;
    height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;
}

.card{

    width:600px;

    background:rgba(255,255,255,0.08);

    backdrop-filter:blur(12px);

    border:1px solid rgba(255,255,255,0.1);

    border-radius:25px;

    padding:50px;

    text-align:center;

    box-shadow:
    0 0 40px rgba(0,0,0,0.4);

}

h1{

    color:white;

    font-size:3.5rem;

    margin-bottom:10px;

}

h2{

    color:#cbd5e1;

    font-weight:400;

    margin-bottom:50px;

}

.menu{

    display:flex;

    flex-direction:column;

    gap:20px;

}

.menu a{

    text-decoration:none;

    color:white;

    padding:18px;

    border-radius:15px;

    background:rgba(255,255,255,0.05);

    border:1px solid rgba(255,255,255,0.1);

    transition:0.3s;

    font-size:1.1rem;

    font-weight:bold;

}

.menu a:hover{

    transform:translateY(-4px);

    background:#38bdf8;

    color:#0f172a;

    box-shadow:
    0 0 25px #38bdf8;

}

.credito{

    margin-top:30px;

    color:#94a3b8;

    font-size:0.9rem;

}

</style>

</head>

<body>

<div class="fondo"></div>

<div class="contenedor">

    <div class="card">

        <h1>Ingeniería Informática</h1>

        <h2>Universidad Nacional Siglo XX</h2>

        <div class="menu">

            <a href="historia.html">
                Historia
            </a>

            <a href="infraestructura.html">
                Infraestructura 3D
            </a>

            <a href="ubicacion.html">
                Ubicación
            </a>

        </div>

        <div class="credito">
            Proyecto de Programación Gráfica
        </div>

    </div>

</div>

</body>
</html>
